spring.application.name=Pricing-Strategy-System

# Use in-memory DB for tests so `mvn test` doesn't require local MySQL/pricing_db.
spring.datasource.url=jdbc:h2:mem:pricing_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

